# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mavenwebappdeployment
  namespace: default
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mavenwebapp
  template:
    metadata:
      labels:
        app: mavenwebapp
    spec:
      containers:
        - name: mavenwebappcontainer
          image: rajsamunder/mavenwebapp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

---

# Service
apiVersion: v1
kind: Service
metadata:
  name: mavenwebappsvc
  namespace: default
spec:
  type: LoadBalancer        # <-- changed from ClusterIP
  selector:
    app: mavenwebapp
  ports:
    - port: 80
      targetPort: 8080
